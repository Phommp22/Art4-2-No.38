<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Task Tracker - ระบบบันทึกภารกิจอวกาศ</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Chakra Petch', sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #0c102b 0%, #050716 100%);
            min-height: 100vh;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* จำลองระบบสุริยะและดวงดาวพื้นหลัง */
        .universe {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }

        .sun {
            position: absolute;
            top: -50px;
            right: -50px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #ff9d00 0%, #ff3c00 70%, transparent 100%);
            border-radius: 50%;
            filter: blur(10px);
            opacity: 0.6;
        }

        .earth-orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 500px;
            height: 500px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: spin 40s linear infinite;
        }

        .earth {
            position: absolute;
            top: 0;
            left: 50%;
            width: 40px;
            height: 40px;
            background: radial-gradient(circle at 30% 30%, #4b9fe1, #1a3c80);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(75, 159, 225, 0.5);
            transform: translate(-50%, -50%);
        }

        .earth::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: #e6e6e6;
            border-radius: 50%;
            top: -15px;
            left: 15px;
            box-shadow: 0 0 5px #fff;
        }

        @keyframes spin {
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* กล่องควบคุมหลัก */
        .space-container {
            background: rgba(16, 22, 58, 0.85);
            border: 2px solid #00f0ff;
            border-radius: 16px;
            padding: 25px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.2);
            z-index: 2;
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 24px;
            text-align: center;
            color: #00f0ff;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        input[type="text"], select, input[type="date"] {
            width: 100%;
            padding: 12px;
            background: rgba(5, 7, 22, 0.7);
            border: 1px solid #34495e;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: #00f0ff;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        /* ปรับแต่งไอคอนปฏิทินในช่องวันที่ */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        .btn-add {
            background: linear-gradient(90deg, #00f0ff, #0072ff);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        .btn-add:hover {
            box-shadow: 0 0 15px #00f0ff;
            transform: translateY(-1px);
        }

        /* ส่วนแสดงผลรายการงานแบบเรียงลำดับ */
        .task-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .task-list::-webkit-scrollbar {
            width: 6px;
        }
        .task-list::-webkit-scrollbar-thumb {
            background: #00f0ff;
            border-radius: 10px;
        }

        .task-item {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid #00ff66;
            padding: 14px;
            border-radius: 0 8px 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10s); }
            to { opacity: 1; transform: translateY(0); }
        }

        .task-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .task-name {
            font-weight: 500;
            font-size: 16px;
        }

        .task-meta {
            font-size: 12px;
            color: #a0aec0;
            display: flex;
            gap: 10px;
        }

        .badge {
            background: rgba(0, 240, 255, 0.15);
            color: #00f0ff;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid rgba(0, 240, 255, 0.3);
        }

        .date-badge {
            color: #ff9d00;
        }

        .btn-delete {
            background: rgba(255, 75, 75, 0.2);
            color: #ff4b4b;
            border: 1px solid #ff4b4b;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.3s;
        }

        .btn-delete:hover {
            background: #ff4b4b;
            color: white;
            box-shadow: 0 0 10px rgba(255, 75, 75, 0.4);
        }

        .no-task {
            text-align: center;
            color: #718096;
            font-size: 14px;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="universe">
        <div class="sun"></div>
        <div class="earth-orbit">
            <div class="earth"></div>
        </div>
    </div>

    <div class="space-container">
        <h1>🌌 Space Mission Dashboard</h1>
        
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="กรอกชื่อภารกิจ / ชื่องานที่ต้องทำ...">
            
            <select id="subjectSelect">
                <option value="">-- เลือกหมวดหมู่ของงาน --</option>
                <option value="วิทยาศาสตร์">🔭 วิทยาศาสตร์</option>
                <option value="คณิตศาสตร์">📐 คณิตศาสตร์</option>
                <option value="ภาษาอังกฤษ">💬 ภาษาอังกฤษ</option>
                <option value="ภาษาไทย">✍️ ภาษาไทย</option>
                <option value="ศิลปะ/การงาน">🎨 ศิลปะ / การงาน</option>
                <option value="ภารกิจทั่วไป">🚀 ภารกิจทั่วไป</option>
            </select>

            <input type="date" id="dateInput">

            <button class="btn-add" onclick="addTask()">บันทึกภารกิจลงตาราง</button>
        </div>

        <ul class="task-list" id="taskList">
            </ul>
    </div>

    <script>
        // โหลดข้อมูลเก่าจาก LocalStorage
        let tasks = JSON.parse(localStorage.getItem('space_missions')) || [];

        function renderTasks() {
            const taskList = document.getElementById('taskList');
            taskList.innerHTML = '';

            if (tasks.length === 0) {
                taskList.innerHTML = '<div class="no-task">ยังไม่มีภารกิจในระบบ สบายใจได้!</div>';
                return;
            }

            // เรียงลำดับตามวันที่ (งานที่เดดไลน์ใกล้สุดจะขึ้นก่อน)
            tasks.sort((a, b) => new Date(a.date) - new Date(b.date));

            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.className = 'task-item';

                // ฟอร์แมตวันที่ให้อ่านง่าย
                let displayDate = 'ไม่ระบุวันส่ง';
                if(task.date) {
                    const dateObj = new Date(task.date);
                    displayDate = "ส่ง: " + dateObj.toLocaleDateString('th-TH', {day: 'numeric', month: 'short', year: '2-digit'});
                }

                li.innerHTML = `
                    <div class="task-info">
                        <div class="task-name">${task.name}</div>
                        <div class="task-meta">
                            <span class="badge">${task.subject || 'ทั่วไป'}</span>
                            <span class="date-badge">📅 ${displayDate}</span>
                        </div>
                    </div>
                    <button class="btn-delete" onclick="deleteTask(${index})">ลบ</button>
                `;
                taskList.appendChild(li);
            });
        }

        function addTask() {
            const taskInput = document.getElementById('taskInput');
            const subjectSelect = document.getElementById('subjectSelect');
            const dateInput = document.getElementById('dateInput');

            if (taskInput.value.trim() === '') {
                alert('กรุณากรอกชื่อภารกิจก่อนครับกัปตัน!');
                return;
            }

            const newTask = {
                name: taskInput.value,
                subject: subjectSelect.value,
                date: dateInput.value
            };

            tasks.push(newTask);
            localStorage.setItem('space_missions', JSON.stringify(tasks));
            
            // รีเซ็ตฟอร์ม
            taskInput.value = '';
            subjectSelect.value = '';
            dateInput.value = '';

            renderTasks();
        }

        function deleteTask(index) {
            tasks.splice(index, 1);
            localStorage.setItem('space_missions', JSON.stringify(tasks));
            renderTasks();
        }

        // เริ่มต้นแสดงผลงานเมื่อเปิดหน้าเว็บ
        renderTasks();
    </script>
</body>
</html>
