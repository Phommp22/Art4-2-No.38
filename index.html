<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Task Manager - บันทึกภารกิจอวกาศ</title>
    <!-- นำเข้าฟอนต์ Google Font เพื่อความสวยงาม -->
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Chakra Petch', sans-serif;
        }

        /* พื้นหลังอวกาศมืดๆ มีมิติ */
        body {
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            min-height: 100vh;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* สร้างเอฟเฟกต์ดวงดาวระยิบระยับ */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.4;
            pointer-events: none;
        }

        /* การ์ดหลัก สไตล์กระจกอวกาศ (Glassmorphism) */
        .container {
            width: 100%;
            max-width: 600px;
            background: rgba(15, 22, 42, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 221, 255, 0.2);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 221, 255, 0.2);
            z-index: 1;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00ddff;
            text-shadow: 0 0 10px rgba(0, 221, 255, 0.6);
        }

        /* ฟอร์มกรอกข้อมูลภารกิจ */
        .task-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input[type="text"], select {
            background: rgba(5, 10, 25, 0.8);
            border: 1px solid #3b82f6;
            color: #fff;
            padding: 12px 15px;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input[type="text"] {
            flex: 1;
        }

        select {
            cursor: pointer;
            min-width: 130px;
        }

        input[type="text"]:focus, select:focus {
            border-color: #00ddff;
            box-shadow: 0 0 10px rgba(0, 221, 255, 0.5);
        }

        /* ปุ่มสไตล์ Sci-Fi นีออน */
        button {
            cursor: pointer;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s ease;
            text-transform: uppercase;
        }

        .btn-add {
            background: linear-gradient(45deg, #00ddff, #3b82f6);
            color: #050a19;
            box-shadow: 0 0 15px rgba(0, 221, 255, 0.4);
            width: 100%;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(0, 221, 255, 0.8);
        }

        /* รายการงาน (Task List) */
        .task-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* ตกแต่ง Scrollbar ให้เข้ากับธีม */
        .task-list::-webkit-scrollbar {
            width: 6px;
        }
        .task-list::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 10px;
        }

        .task-item {
            background: rgba(255, 255, 255, 0.03);
            border-left: 5px solid #00ddff;
            padding: 15px;
            border-radius: 0 12px 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
            animation: fadeIn 0.4s ease;
        }

        .task-item:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: scale(1.01);
        }

        .task-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
            margin-right: 15px;
        }

        .task-text {
            font-size: 1.1rem;
            word-break: break-word;
        }

        /* ป้ายกำกับวิชา (Subject Tags) สีสันอวกาศ */
        .subject-tag {
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 15px;
            width: fit-content;
            font-weight: bold;
            text-transform: uppercase;
        }

        .tag-math { background: #ff4757; color: #fff; }
        .tag-sci { background: #2ed573; color: #fff; }
        .tag-eng { background: #ffa502; color: #fff; }
        .tag-thai { background: #9b59b6; color: #fff; }
        .tag-social { background: #3498db; color: #fff; }
        .tag-other { background: #718093; color: #fff; }

        /* ปุ่มควบคุมรายการ */
        .task-actions {
            display: flex;
            gap: 8px;
        }

        .btn-edit {
            background: rgba(255, 165, 2, 0.2);
            border: 1px solid #ffa502;
            color: #ffa502;
            padding: 6px 12px;
            font-size: 0.85rem;
        }

        .btn-edit:hover {
            background: #ffa502;
            color: #000;
            box-shadow: 0 0 10px rgba(ffa502, 0.5);
        }

        .btn-delete {
            background: rgba(255, 71, 87, 0.2);
            border: 1px solid #ff4757;
            color: #ff4757;
            padding: 6px 12px;
            font-size: 0.85rem;
        }

        .btn-delete:hover {
            background: #ff4757;
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 71, 87, 0.5);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 Space Mission Board</h1>
        
        <!-- ส่วนสำหรับกรอกและเพิ่มภารกิจ -->
        <div class="task-form">
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="กรอกชื่อภารกิจ/งานที่ต้องทำ..." autocomplete="off">
                <select id="subjectSelect">
                    <option value="math">คณิตศาสตร์</option>
                    <option value="sci">วิทยาศาสตร์</option>
                    <option value="eng">ภาษาอังกฤษ</option>
                    <option value="thai">ภาษาไทย</option>
                    <option value="social">สังคมศึกษา</option>
                    <option value="other">วิชาอื่นๆ</option>
                </select>
            </div>
            <button class="btn-add" id="addBtn" onclick="addOrUpdateTask()">บันทึกภารกิจ</button>
        </div>

        <!-- รายการงานที่จะแสดงผล -->
        <ul class="task-list" id="taskList"></ul>
    </div>

    <script>
        // ดึงข้อมูลเดิมจาก LocalStorage (ถ้ามี)
        let tasks = JSON.parse(localStorage.getItem('space_tasks')) || [];
        let editId = null; // ตัวแปรเก็บ ID ตอนที่กำลังแก้ไขงาน

        const taskInput = document.getElementById('taskInput');
        const subjectSelect = document.getElementById('subjectSelect');
        const addBtn = document.getElementById('addBtn');
        const taskList = document.getElementById('taskList');

        // ฟังก์ชันจับคู่ คลาสสี ของแต่ละวิชา
        function getSubjectClass(subject) {
            switch(subject) {
                case 'math': return 'tag-math';
                case 'sci': return 'tag-sci';
                case 'eng': return 'tag-eng';
                case 'thai': return 'tag-thai';
                case 'social': return 'tag-social';
                default: return 'tag-other';
            }
        }

        // ฟังก์ชันแปลงชื่อวิชาเป็นภาษาไทยเพื่อแสดงผล
        function getSubjectName(subject) {
            const names = {
                math: 'คณิตศาสตร์',
                sci: 'วิทยาศาสตร์',
                eng: 'ภาษาอังกฤษ',
                thai: 'ภาษาไทย',
                social: 'สังคมศึกษา',
                other: 'วิชาอื่นๆ'
            };
            return names[subject] || 'ทั่วไป';
        }

        // ฟังก์ชันบันทึกข้อมูลลง LocalStorage และแสดงผลใหม่
        function saveAndRender() {
            localStorage.setItem('space_tasks', JSON.stringify(tasks));
            renderTasks();
        }

        // ฟังก์ชันวาดรายการงานบนหน้าเว็บ
        function renderTasks() {
            taskList.innerHTML = '';
            
            if (tasks.length === 0) {
                taskList.innerHTML = `<li style="text-align:center; color: #718093; padding: 20px;">ไม่มีภารกิจค้างอยู่ ยินดีด้วยผู้บัญชาการ! 🛸</li>`;
                return;
            }

            tasks.forEach(task => {
                const li = document.createElement('li');
                li.className = 'task-item';
                
                li.innerHTML = `
                    <div class="task-info">
                        <span class="task-text">${task.text}</span>
                        <span class="subject-tag ${getSubjectClass(task.subject)}">${getSubjectName(task.subject)}</span>
                    </div>
                    <div class="task-actions">
                        <button class="btn-edit" onclick="editTask(${task.id})">แก้ไข</button>
                        <button class="btn-delete" onclick="deleteTask(${task.id})">ลบ</button>
                    </div>
                `;
                taskList.appendChild(li);
            });
        }

        // ฟังก์ชัน เพิ่ม หรือ อัปเดตงาน
        function addOrUpdateTask() {
            const text = taskInput.value.trim();
            const subject = subjectSelect.value;

            if (text === '') {
                alert('กรุณากรอกชื่อภารกิจก่อนครับกัปตัน!');
                return;
            }

            if (editId !== null) {
                // โหมดแก้ไขงานเดิม
                tasks = tasks.map(task => {
                    if (task.id === editId) {
                        return { ...task, text: text, subject: subject };
                    }
                    return task;
                });
                editId = null;
                addBtn.innerText = 'บันทึกภารกิจ';
                addBtn.style.background = 'linear-gradient(45deg, #00ddff, #3b82f6)';
            } else {
                // โหมดเพิ่มงานใหม่
                const newTask = {
                    id: Date.now(),
                    text: text,
                    subject: subject
                };
                tasks.push(newTask);
            }

            taskInput.value = '';
            saveAndRender();
        }

        // ฟังก์ชันเรียกข้อมูลงานมาเติมในฟอร์มเพื่อแก้ไข
        function editTask(id) {
            const taskToEdit = tasks.find(task => task.id === id);
            if (taskToEdit) {
                taskInput.value = taskToEdit.text;
                subjectSelect.value = taskToEdit.subject;
                editId = id;
                addBtn.innerText = 'อัปเดตภารกิจ 🛰️';
                addBtn.style.background = 'linear-gradient(45deg, #ffa502, #ff7f50)';
                taskInput.focus();
            }
        }

        // ฟังก์ชันลบงาน
        function deleteTask(id) {
            if (confirm('คุณแน่ใจใช่ไหมที่จะลบภารกิจนี้ออกจากระบบ?')) {
                tasks = tasks.filter(task => task.id !== id);
                // หากกำลังแก้ไขงานนั้นอยู่แล้วดันกดลบ ให้ล้างค่าสถานะแก้ไขด้วย
                if (editId === id) {
                    editId = null;
                    addBtn.innerText = 'บันทึกภารกิจ';
                    addBtn.style.background = 'linear-gradient(45deg, #00ddff, #3b82f6)';
                    taskInput.value = '';
                }
                saveAndRender();
            }
        }

        // สั่งให้แสดงผลตั้งแต่เริ่มเปิดเว็บครั้งแรก
        renderTasks();
    </script>
</body>
</html>
