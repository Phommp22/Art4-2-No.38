<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการงาน - ธีมสุริยะจักรวาล</title>
    <!-- นำเข้า Google Fonts ภาษาไทย และ Font Awesome สำหรับไอคอน -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* สไตล์พื้นฐาน & ธีมอวกาศ */
        body {
            font-family: 'Sarabun', sans-serif;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            color: #ffffff;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* การ์ดหลัก */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* หัวข้อ */
        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 4px solid #4fc3f7;
            padding-left: 10px;
        }

        .card-title i {
            color: #4fc3f7;
        }

        /* โซน Dashboard (การ์ด 3 สี) */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .dash-box {
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .dash-box:hover {
            transform: translateY(-3px);
        }

        /* ธีมสีดวงดาวตามประเภทงาน */
        .box-all {
            background: linear-gradient(135deg, #2b5876, #4e4376); /* ธีมเนบิวลา/งานทั้งหมด */
            grid-column: span 1;
        }
        .box-pending {
            background: linear-gradient(135deg, #f12711, #f5af19); /* ธีมดวงอาทิตย์/ยังไม่เสร็จ */
            grid-column: span 1;
        }
        .box-done {
            background: linear-gradient(135deg, #11998e, #38ef7d); /* ธีมโลก/เสร็จสิ้น */
            grid-column: span 2;
        }

        .box-label {
            font-size: 0.95rem;
            font-weight: 400;
            margin-bottom: 5px;
            opacity: 0.9;
        }

        .box-count {
            font-size: 2rem;
            font-weight: 700;
            margin: 0;
        }

        /* ส่วนแสดงรายวิชาด้านล่างแดชบอร์ด */
        .sub-info {
            font-size: 0.9rem;
            color: #b0bec5;
            display: flex;
            align-items: center;
            gap: 8px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
        }

        /* ฟอร์มกรอกข้อมูล */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group:last-of-type {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: #e0e0e0;
        }

        label span {
            color: #ff5252;
        }

        /* สไตล์ Input, Select */
        input[type="text"], input[type="date"], select {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #ffffff;
            font-family: 'Sarabun', sans-serif;
            font-size: 0.95rem;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            border-color: #4fc3f7;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 8px rgba(79, 195, 247, 0.5);
        }

        /* ปรับแต่งสีปฏิทินและตัวเลือกให้เข้ากับธีมมืด */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }

        select option {
            background: #1b2735;
            color: #fff;
        }

        /* ปุ่มบันทึกข้อมูล (ธีมจรวดขับเคลื่อน) */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0288d1, #00796b);
            border: none;
            border-radius: 8px;
            color: white;
            font-family: 'Sarabun', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(2, 136, 209, 0.4);
            transition: all 0.3s;
        }

        .btn-submit:hover {
            background: linear-gradient(135deg, #03a9f4, #009688);
            box-shadow: 0 6px 20px rgba(3, 169, 244, 0.6);
            transform: translateY(-2px);
        }

        .btn-submit:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

<div class="container">

    <!-- ส่วนที่ 1: สรุปภาพรวมงาน (Dashboard) -->
    <div class="card">
        <div class="card-title">
            <i class="fa-solid fa-chart-pie"></i> สรุปภาพรวมงาน (Dashboard)
        </div>
        
        <div class="dashboard-grid">
            <div class="dash-box box-all">
                <div class="box-label">งานทั้งหมด</div>
                <div class="box-count">0</div>
            </div>
            <div class="dash-box box-pending">
                <div class="box-label">ยังไม่เสร็จ</div>
                <div class="box-count">0</div>
            </div>
            <div class="dash-box box-done">
                <div class="box-label">เสร็จสิ้นแล้ว</div>
                <div class="box-count">0</div>
            </div>
        </div>

        <div class="sub-info">
            <i class="fa-solid fa-shuttle-space"></i> จำนวนงานแยกตามรายวิชา:
        </div>
    </div>

    <!-- ส่วนที่ 2: ฟอร์มเพิ่มงานใหม่ -->
    <div class="card">
        <div class="card-title">
            <i class="fa-solid fa-circle-plus"></i> เพิ่มงานใหม่
        </div>

        <form onsubmit="event.preventDefault(); alert('บันทึกข้อมูลงานสู่อวกาศเรียบร้อย!');">
            <div class="form-group">
                <label for="task-name">ชื่องาน / การบ้าน <span>*</span></label>
                <input type="text" id="task-name" placeholder="เช่น ส่งรายงานวิชาดาวอังคารศึกษา" required>
            </div>

            <div class="form-group">
                <label for="subject">รายวิชา <span>*</span></label>
                <input type="text" id="subject" placeholder="เช่น ดาราศาสตร์ฟิสิกส์เบื้องต้น" required>
            </div>

            <div class="form-group">
                <label for="due-date">วันที่ครบกำหนดส่ง <span>*</span></label>
                <input type="date" id="due-date" required>
            </div>

            <div class="form-group">
                <label for="priority">ระดับความสำคัญ</label>
                <select id="priority">
                    <option value="low">ต่ำ (สีเขียวดาวเคราะห์)</option>
                    <option value="medium" selected>ปานกลาง (สีเหลืองดาวฤกษ์)</option>
                    <option value="high">สูงมาก (สีแดงซูเปอร์โนวา)</option>
                </select>
            </div>

            <button type="submit" class="btn-submit">
                <i class="fa-solid fa-floppy-disk"></i> บันทึกข้อมูลงาน
            </button>
        </form>
    </div>

</div>

</body>
</html>
